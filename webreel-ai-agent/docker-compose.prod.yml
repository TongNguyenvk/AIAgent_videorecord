# ============================================================
# WebReel Production Stack
# API + Redis (INTERNAL ONLY) + Web Worker (with built-in Chrome)
# ============================================================
#
# SECURITY: Redis KHONG expose ra ngoai.
# Windows OS Worker ket noi qua SSH Tunnel:
#   ssh -N -L 6379:localhost:6379 user@vps-ip
#   set REDIS_URL=redis://localhost:6379/0
#   python -m worker.os_worker
#
# TRUOC KHI CHAY: Tao swap space 2-4GB tren VPS:
#   sudo fallocate -l 4G /swapfile
#   sudo chmod 600 /swapfile
#   sudo mkswap /swapfile
#   sudo swapon /swapfile
#   echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
#

services:
  # --- MongoDB (persistent database) ---
  mongodb:
    image: mongo:7
    container_name: webreel-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-webreel}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-webreel_mongo_2026}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Redis (INTERNAL ONLY - khong expose port ra ngoai!) ---
  redis:
    image: redis:7-alpine
    container_name: webreel-redis
    # KHONG co ports: mapping -> chi container trong mang noi bo truy cap duoc
    # Bot scan (Shodan, masscan) se KHONG tim thay Redis cua ban
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-webreel_secret_2026}
      --protected-mode yes
      --bind 0.0.0.0
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-webreel_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 320M

  # --- FastAPI Backend ---
  api:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.backend
    container_name: webreel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - MONGO_URL=mongodb://${MONGO_USER:-webreel}:${MONGO_PASSWORD:-webreel_mongo_2026}@mongodb:27017
      - MONGO_DB=webreel
      - OUTPUT_DIR=/app/output
      - PYTHONIOENCODING=utf-8
    volumes:
      - output_data:/app/output
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Frontend (React SPA + Nginx reverse proxy) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # /api de Nginx reverse proxy toi backend container
        VITE_API_URL: /api
    container_name: webreel-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Web Worker (polls web-queue, runs pipeline + built-in Chrome) ---
  web-worker:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    # Override CMD: entrypoint starts Xvfb + VNC + noVNC, then runs worker
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["python", "-m", "worker.web_worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_OPTIONS="--max-old-space-size=2048"
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - CHROME_CDP_URL=http://localhost:9222
      - DISPLAY=:99
      - WORKER_ID=web-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FPT_API_KEY=${FPT_API_KEY:-}
      - PYTHONIOENCODING=utf-8
    shm_size: "2gb"
    volumes:
      - output_data:/app/output
      - chrome_master_data:/app/chrome_master:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G

  # --- Office Worker (polls office-queue, runs slide pipeline) ---
  office-worker:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.backend
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    command: ["python", "-m", "worker.office_worker"]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - WORKER_ID=office-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PYTHONIOENCODING=utf-8
    volumes:
      - output_data:/app/output
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G

  # --- Presentation Worker (PowerPoint Online testing via Chrome) ---
  presentation-worker:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["python", "-m", "worker.presentation_worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_OPTIONS="--max-old-space-size=2048"
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - CHROME_CDP_URL=http://localhost:9222
      - DISPLAY=:99
      - WORKER_QUEUE=presentation-queue
      - WORKER_ID=presentation-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FPT_API_KEY=${FPT_API_KEY:-}
      - PYTHONIOENCODING=utf-8
      - MS_CLIENT_ID=${MS_CLIENT_ID:-}
      - MS_CLIENT_SECRET=${MS_CLIENT_SECRET:-}
      - MS_TENANT_ID=${MS_TENANT_ID:-}
      - MS_BOT_EMAIL=${MS_BOT_EMAIL:-}
    shm_size: "2gb"
    volumes:
      - output_data:/app/output
      - chrome_master_data:/app/chrome_master:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G

  # --- Presentation GG Worker (Google Slides via Chrome) ---
  presentation-gg-worker:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    # container_name removed: each job gets its own named container
    profiles: ["worker"]
    working_dir: /app/webreel-ai-agent
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["python", "-m", "worker.presentation_gg_worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_OPTIONS="--max-old-space-size=2048"
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - CHROME_CDP_URL=http://localhost:9222
      - CHROME_PROFILE_DIR=/app/chrome_profile
      - DISPLAY=:99
      - WORKER_QUEUE=presentation-gg-queue
      - WORKER_ID=presentation-gg-worker-1
      - OUTPUT_DIR=/app/output
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FPT_API_KEY=${FPT_API_KEY:-}
      - PYTHONIOENCODING=utf-8
    shm_size: "2gb"
    volumes:
      - output_data:/app/output
      - chrome_master_data:/app/chrome_master:ro
      - key_data:/app/webreel-ai-agent/key:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G

  # --- Auto-Scaler (event-driven worker scaling) ---
  autoscaler:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.autoscaler
    container_name: webreel-autoscaler
    working_dir: /app/webreel-ai-agent
    command: ["python", "-m", "worker.autoscaler"]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-webreel_secret_2026}@redis:6379/0
      - MAX_WEB_WORKERS=${MAX_WEB_WORKERS:-2}
      - MAX_PRES_WORKERS=${MAX_PRES_WORKERS:-2}
      - MAX_PRES_GG_WORKERS=${MAX_PRES_GG_WORKERS:-2}
      - MAX_OFFICE_WORKERS=${MAX_OFFICE_WORKERS:-2}
      - COMPOSE_FILE=/compose/docker-compose.prod.yml
      - COMPOSE_PROJECT=webreel-ai-agent
    volumes:
      # Mount Docker socket so autoscaler can launch/stop containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount thư mục hiện tại để lấy docker-compose.prod.yml
      - .:/compose:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Session Manager (Master Chrome Profile + Freeze API) ---
  session-manager:
    image: webreel-worker:latest
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile.worker
    container_name: webreel-session-manager
    ports:
      - "6080:6080"  # noVNC web interface
      - "5900:5900"  # VNC server
      - "8001:8001"  # Internal freeze API
    working_dir: /app/webreel-ai-agent
    entrypoint: ["/app/scripts/session-manager-start.sh"]
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
      - CHROME_PROFILE_DIR=/app/chrome_master
      - VNC_PORT=5900
      - NOVNC_PORT=6080
    volumes:
      - chrome_master_data:/app/chrome_master:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  mongodb_data:
  redis_data:
  output_data:
  chrome_profile_data:
  chrome_profile_gg_data:
  key_data:
  chrome_master_data:

# Tong RAM: 1G (MongoDB) + 320M (Redis) + 1G (API) + 128M (Frontend) + 2G (Worker x N) + 128M (Autoscaler)
# VPS 8GB: thoai mai voi max 2 workers moi loai.
# Autoscaler launch container rieng cho moi job, tu dong xoa khi xong.
