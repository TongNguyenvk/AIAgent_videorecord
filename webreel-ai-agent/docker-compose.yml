services:
  webreel-ai-agent:
    build:
      context: ..
      dockerfile: webreel-ai-agent/Dockerfile
    container_name: webreel-ai-agent
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - OUTPUT_DIR=/app/output
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./output:/app/output
    # Fix lỗi "Aw, Snap!" của Headless Chrome khi thiếu bộ nhớ chia sẻ
    shm_size: "2gb"
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G